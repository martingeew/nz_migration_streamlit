project:
  type: website
  output-dir: ../docs

website:
  title: "NZ Migration: Fact or Fiction"
  description: "Political claims about NZ migration tested against monthly data from Statistics NZ."
  repo-url: https://github.com/martingeew/nz_migration_streamlit
  navbar:
    left:
      - href: index.qmd
        text: Home
    right:
      - text: "Source code"
        href: https://github.com/martingeew/nz_migration_streamlit

format:
  html:
    theme:
      - flatly
      - styles.css
    toc: true
    toc-depth: 2
    number-sections: false
    smooth-scroll: true
    include-in-header:
      - text: |
          <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
          <script>
          document.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth >= 768) return;
            setTimeout(function() {
              document.querySelectorAll('.plotly-graph-div').forEach(function(div) {
                if (!div.data) return;
                Plotly.relayout(div, { hovermode: 'closest' });
              });
            }, 500);
          });
          </script>

# No Python execution during render — charts are pre-generated by build_dashboard.py
